networks:
  frontend_network:
  backend_network:
    internal: true

volumes:
  biblioteca_postgres_data:

services:
  postgres:
    image: postgres:17-alpine
    container_name: biblioteca_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-biblioteca}
      POSTGRES_USER: ${DB_USER:-biblioteca}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-biblioteca}
    volumes:
      - biblioteca_postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-biblioteca}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: biblioteca_redis
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    container_name: biblioteca_migrate
    command: sh -c "node src/database/migrate.js && node src/database/run-sql-seed.js"
    environment:
      DB_NAME: ${DB_NAME:-biblioteca}
      DB_USER: ${DB_USER:-biblioteca}
      DB_PASSWORD: ${DB_PASSWORD:-biblioteca}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      SEED_USER_NAME: ${SEED_USER_NAME:-Administrador}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-admin@biblioteca.local}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-123456}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_network

  api:
    build: .
    container_name: biblioteca_api
    expose:
      - "3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_NAME: ${DB_NAME:-biblioteca}
      DB_USER: ${DB_USER:-biblioteca}
      DB_PASSWORD: ${DB_PASSWORD:-biblioteca}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      JWT_SECRET: ${JWT_SECRET:-segredo-didatico-biblioteca-api}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - frontend_network
      - backend_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: biblioteca_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend_network
